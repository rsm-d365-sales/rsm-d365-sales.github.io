name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Inject runtime config from repo Secrets so the flow URLs never live in git.
      # Define SUBMIT_URL (and optionally OPTIONS_URL) under
      # Settings → Secrets and variables → Actions → New repository secret.
      - name: Inject runtime config
        run: |
          cat > config.js <<'EOF'
          window.RSM_CONFIG = {
            SUBMIT_URL: "${{ secrets.SUBMIT_URL }}",
            OPTIONS_URL: "${{ secrets.OPTIONS_URL }}",
            REQUESTS_URL: "${{ secrets.REQUESTS_URL }}",
            UPDATE_STATUS_URL: "${{ secrets.UPDATE_STATUS_URL }}"
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
